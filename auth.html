<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Lead Ledger</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="d-flex flex-column min-vh-100 bg-body-tertiary">

  <main class="flex-grow-1 d-flex align-items-center">
    <div class="container">
      <div class="auth-card">

        <div class="text-center mb-4">
          <h1 class="h3 fw-bold mb-1">Lead Ledger</h1>
          <p class="text-secondary small mb-0">Sign in to manage your army lists</p>
        </div>

        <!-- Tab navigation -->
        <ul class="nav nav-tabs mb-4" role="tablist">
          <li class="nav-item" role="presentation">
            <button class="nav-link active" id="tab-login"
              data-bs-toggle="tab" data-bs-target="#pane-login"
              type="button" role="tab">Sign In</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="tab-signup"
              data-bs-toggle="tab" data-bs-target="#pane-signup"
              type="button" role="tab">Create Account</button>
          </li>
        </ul>

        <div class="tab-content">

          <!-- ── Login ─────────────────────────────────────────────────────── -->
          <div class="tab-pane fade show active" id="pane-login" role="tabpanel">
            <form id="form-login" novalidate>
              <div class="mb-3">
                <label for="login-email" class="form-label">Email</label>
                <input type="email" id="login-email" class="form-control"
                  autocomplete="email" required>
              </div>
              <div class="mb-3">
                <label for="login-password" class="form-label">Password</label>
                <input type="password" id="login-password" class="form-control"
                  autocomplete="current-password" required>
              </div>
              <div id="login-error" class="alert alert-danger py-2 d-none" role="alert"></div>
              <button type="submit" class="btn btn-accent w-100" id="btn-login">Sign In</button>
            </form>
          </div>

          <!-- ── Sign Up ────────────────────────────────────────────────────── -->
          <div class="tab-pane fade" id="pane-signup" role="tabpanel">
            <form id="form-signup" novalidate>
              <div class="mb-3">
                <label for="signup-username" class="form-label">Username</label>
                <input type="text" id="signup-username" class="form-control"
                  autocomplete="username" required>
              </div>
              <div class="mb-3">
                <label for="signup-email" class="form-label">Email</label>
                <input type="email" id="signup-email" class="form-control"
                  autocomplete="email" required>
              </div>
              <div class="mb-3">
                <label for="signup-password" class="form-label">Password</label>
                <input type="password" id="signup-password" class="form-control"
                  autocomplete="new-password" required minlength="8">
                <div class="form-text">At least 8 characters.</div>
              </div>
              <div id="signup-error"   class="alert alert-danger  py-2 d-none" role="alert"></div>
              <div id="signup-success" class="alert alert-success py-2 d-none" role="alert">
                Account created! Please check your email to verify your account.
              </div>
              <button type="submit" class="btn btn-accent w-100" id="btn-signup">Create Account</button>
            </form>
          </div>

        </div><!-- /tab-content -->

        <div id="deleted-notice" class="alert alert-info py-2 mt-3 d-none">
          Your data has been removed and you have been signed out.
        </div>

      </div><!-- /auth-card -->
    </div>
  </main>

  <div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { signIn, signUp, redirectIfAuthenticated } from './js/auth.js';

    // Redirect to home if already logged in
    await redirectIfAuthenticated();

    // Show deletion notice if redirected from account delete flow
    if (new URLSearchParams(window.location.search).get('deleted') === '1') {
      document.getElementById('deleted-notice').classList.remove('d-none');
    }

    // ── Login form ────────────────────────────────────────────────────────────
    document.getElementById('form-login').addEventListener('submit', async e => {
      e.preventDefault();
      const btn   = document.getElementById('btn-login');
      const errEl = document.getElementById('login-error');
      errEl.classList.add('d-none');
      btn.disabled    = true;
      btn.textContent = 'Signing in…';

      try {
        await signIn(
          document.getElementById('login-email').value.trim(),
          document.getElementById('login-password').value
        );
        window.location.href = '/lists';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('d-none');
        btn.disabled    = false;
        btn.textContent = 'Sign In';
      }
    });

    // ── Sign-up form ──────────────────────────────────────────────────────────
    document.getElementById('form-signup').addEventListener('submit', async e => {
      e.preventDefault();
      const btn    = document.getElementById('btn-signup');
      const errEl  = document.getElementById('signup-error');
      const succEl = document.getElementById('signup-success');
      errEl.classList.add('d-none');
      succEl.classList.add('d-none');
      btn.disabled    = true;
      btn.textContent = 'Creating…';

      try {
        await signUp(
          document.getElementById('signup-username').value.trim(),
          document.getElementById('signup-email').value.trim(),
          document.getElementById('signup-password').value
        );
        succEl.classList.remove('d-none');
        document.getElementById('form-signup').reset();
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('d-none');
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
