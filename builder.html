<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Builder — Lead Ledger</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="builder-page">

  <!-- ── Navbar ──────────────────────────────────────────────────────────────── -->
  <nav class="navbar bg-body-secondary border-bottom flex-shrink-0">
    <div class="container-fluid d-flex align-items-center gap-3">

      <!-- Left: back link -->
      <a class="navbar-brand me-0" href="/lists" title="Back to army lists">
        <i class="bi bi-arrow-left me-1"></i>Lead Ledger
      </a>

      <!-- Centre: list name + save status -->
      <div class="d-flex align-items-center gap-2 flex-grow-1 ms-2">
        <span id="list-name" class="fw-semibold text-truncate"></span>
        <span id="save-status" class="small text-secondary"></span>
      </div>

      <!-- Right: save button + user + sign out -->
      <div class="d-flex align-items-center gap-2 flex-shrink-0">
        <span class="text-secondary small d-none d-md-inline" id="nav-user"></span>
        <button class="btn btn-sm btn-accent" id="btn-save">
          <i class="bi bi-floppy me-1"></i>Save
        </button>
        <button class="btn btn-sm btn-outline-secondary" id="btn-logout">Sign Out</button>
      </div>

    </div>
  </nav>

  <!-- ── Three-column builder layout ───────────────────────────────────────── -->
  <div class="builder-wrapper">

    <!-- Left sidebar: available units -->
    <aside class="builder-sidebar-left d-flex flex-column">
      <div class="px-3 py-2 border-bottom flex-shrink-0"
           style="font-size:0.7rem;text-transform:uppercase;letter-spacing:0.05em;color:var(--bs-secondary-color)">
        Available Units
      </div>
      <div id="available-units" class="flex-grow-1 overflow-y-auto py-1"></div>
    </aside>

    <!-- Main area: current list -->
    <section class="builder-main">
      <div class="d-flex justify-content-between align-items-center mb-3 flex-shrink-0">
        <h5 class="mb-0">Current List</h5>
        <div class="d-flex gap-3 small text-secondary">
          <span>Units: <strong id="total-units" class="text-body">0</strong></span>
          <span>MP: <strong id="total-mp" class="text-body">0</strong></span>
          <span>Mats: <strong id="total-mats" class="text-body">0</strong></span>
        </div>
      </div>
      <div id="current-units" class="flex-grow-1"></div>
    </section>

    <!-- Right sidebar: selected unit detail -->
    <aside class="builder-sidebar-right d-flex flex-column">
      <div class="px-3 py-2 border-bottom flex-shrink-0"
           style="font-size:0.7rem;text-transform:uppercase;letter-spacing:0.05em;color:var(--bs-secondary-color)">
        Unit Details
      </div>
      <div id="unit-detail" class="flex-grow-1">
        <p class="text-secondary small p-3">Click a unit on the left to see its details.</p>
      </div>
    </aside>

  </div><!-- /builder-wrapper -->

  <div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/tracker.js"></script>
  <script type="module" src="js/builder.js"></script>
</body>
</html>
