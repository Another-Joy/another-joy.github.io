<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Army Lists — Army Builder</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg bg-body-secondary border-bottom">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">⚔️ Army Builder</a>
      <button class="navbar-toggler" type="button"
        data-bs-toggle="collapse" data-bs-target="#navMenu"
        aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="index.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="account.html">Account</a>
          </li>
        </ul>
        <div class="d-flex align-items-center gap-2">
          <span class="text-secondary small" id="nav-user"></span>
          <button class="btn btn-sm btn-outline-secondary" id="btn-logout">Sign Out</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="container py-4">

    <div class="d-flex align-items-center justify-content-between mb-4">
      <h2 class="h4 mb-0">My Army Lists</h2>
      <button class="btn btn-accent" id="btn-new-list">
        <i class="bi bi-plus-lg me-1"></i>New List
      </button>
    </div>

    <!-- Loading spinner -->
    <div id="lists-loading" class="text-center py-5">
      <div class="spinner-border text-secondary" role="status">
        <span class="visually-hidden">Loading…</span>
      </div>
    </div>

    <!-- Empty state -->
    <div id="lists-empty" class="d-none text-center py-5 text-secondary">
      <i class="bi bi-shield display-3 d-block mb-3 opacity-25"></i>
      <p class="mb-0 fw-semibold">No army lists yet.</p>
      <p class="small">Click <strong>New List</strong> to get started.</p>
    </div>

    <!-- Army list table -->
    <div id="lists-table" class="d-none">
      <table class="table table-hover align-middle">
        <thead class="table-dark">
          <tr>
            <th>Name</th>
            <th>Last Edited</th>
            <th>Units</th>
            <th>Cost</th>
            <th class="text-end">Actions</th>
          </tr>
        </thead>
        <tbody id="lists-tbody"></tbody>
      </table>
    </div>

  </main>

  <div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/home.js"></script>
</body>
</html>
