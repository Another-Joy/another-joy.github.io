<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account — Army Builder</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg bg-body-secondary border-bottom">
    <div class="container-fluid">
      <a class="navbar-brand" href="/home">⚔️ Army Builder</a>
      <button class="navbar-toggler" type="button"
        data-bs-toggle="collapse" data-bs-target="#navMenu"
        aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link" href="/home">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="/account">Account</a>
          </li>
        </ul>
        <div class="d-flex align-items-center gap-2">
          <span class="text-secondary small" id="nav-user"></span>
          <button class="btn btn-sm btn-outline-secondary" id="btn-logout">Sign Out</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="container py-4" style="max-width: 640px">

    <h2 class="h4 mb-4">Account Settings</h2>

    <!-- ── Profile ─────────────────────────────────────────────────────────── -->
    <div class="card mb-4">
      <div class="card-header fw-semibold">Profile</div>
      <div class="card-body">
        <form id="form-profile" novalidate>
          <div class="mb-3">
            <label for="input-username" class="form-label">Username</label>
            <input type="text" id="input-username" class="form-control"
              autocomplete="username" required>
          </div>
          <button type="submit" class="btn btn-accent">Save Changes</button>
        </form>
      </div>
    </div>

    <!-- ── Change password ──────────────────────────────────────────────────── -->
    <div class="card mb-4">
      <div class="card-header fw-semibold">Change Password</div>
      <div class="card-body">
        <form id="form-password" novalidate>
          <div class="mb-3">
            <label for="input-current-pw" class="form-label">Current Password</label>
            <input type="password" id="input-current-pw" class="form-control"
              autocomplete="current-password" required>
          </div>
          <div class="mb-3">
            <label for="input-new-pw" class="form-label">New Password</label>
            <input type="password" id="input-new-pw" class="form-control"
              autocomplete="new-password" required minlength="8">
            <div class="form-text">At least 8 characters.</div>
          </div>
          <div class="mb-3">
            <label for="input-confirm-pw" class="form-label">Confirm New Password</label>
            <input type="password" id="input-confirm-pw" class="form-control"
              autocomplete="new-password" required>
          </div>
          <button type="submit" class="btn btn-accent">Update Password</button>
        </form>
      </div>
    </div>

    <!-- ── Danger zone ──────────────────────────────────────────────────────── -->
    <div class="card border-danger">
      <div class="card-header fw-semibold text-danger">Danger Zone</div>
      <div class="card-body">
        <p class="text-secondary small mb-3">
          Deleting your account will permanently remove all your army lists.
          This action cannot be undone.
        </p>
        <button class="btn btn-outline-danger" id="btn-delete">
          <i class="bi bi-trash me-1"></i>Delete My Account
        </button>
      </div>
    </div>

  </main>

  <div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/account.js"></script>
</body>
</html>
