<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extended Rules — Lead Ledger</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

  <!-- navbar injected by js/nav.js -->

  <!-- ── Page header ──────────────────────────────────────────────────────── -->
  <div class="border-bottom py-3" style="background: var(--wg-bg-panel)">
    <div class="container d-flex align-items-center justify-content-between gap-3 flex-wrap">
      <div>
        <h1 class="h4 fw-bold mb-0">Extended Rules</h1>
        <p class="text-secondary small mb-0">Comprehensive numbered rules reference</p>
      </div>
      <a href="/rules/LeadLedger%20RuleBook.pdf" target="_blank" rel="noopener"
         class="btn btn-outline-secondary btn-sm flex-shrink-0">
        <i class="bi bi-file-earmark-pdf me-1"></i>Open Rulebook PDF
      </a>
    </div>
  </div>

  <!-- ── Two-column layout ────────────────────────────────────────────────── -->
  <div class="rules-page-wrapper">

    <!-- Left: sticky section navigation -->
    <nav class="rules-sidenav" id="rules-nav" aria-label="Rules sections">
      <!-- populated by rules.js -->
    </nav>

    <!-- Right: scrollable rules content -->
    <main class="rules-content" id="rules-main">
      <!-- populated by rules.js -->
    </main>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../js/rules.js"></script>
</body>
</html>
